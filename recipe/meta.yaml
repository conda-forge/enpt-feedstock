{% set name = "enpt" %}
{% set version = "1.3.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/enpt-{{ version }}.tar.gz
  sha256: 1e8c57d186a2e1a112576f32bfa891d7b3945e602a4ffabf56fc4d07bb185dcb

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - enpt = enpt.cli:main

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - acwater >=0.4.1
    - arosics >=1.0.0
    - cerberus
    - gdal
    - geoarray >=0.19.2
    - isofit =3.4.3
    - jsmin
    - lxml
    - matplotlib-base
    - mvgavg
    - natsort
    - numpy >=2
    - numpy-indexed
    - packaging
    - pandas
    - py-tools-ds >=0.14.25
    - pyproj >=3.4.0
    - scikit-image
    - scipy
    - sensormapgeo >=1.0.0
    - sicor >=0.19.1
    - tqdm
    - utm
  run_constrained:
    - eccodes !=2.42.0  # classified as suspicous by ESET on Windows
    - hygeos-core <1.3.0  # should be fixed with polymer>4.17.3

test:
  imports:
    - enpt
    - enpt.execution
  commands:
    - pip check
    - enpt --help
  requires:
    - pip
    - python >={{ python_min }}

about:
  home: https://git.gfz.de/EnMAP/GFZ_Tools_EnMAP_BOX/EnPT
  summary: EnMAP Processing Tool
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - danschef
